<text x="760" y="606" fill="#475569" font-size="16" font-weight="400" text-anchor="start">结论：paper7 retrieval 复现还没有对齐原论文主表，所以 VOP 当前更适合先作为方法证据，而不是直接拿去对主表宣称提升。</text>
