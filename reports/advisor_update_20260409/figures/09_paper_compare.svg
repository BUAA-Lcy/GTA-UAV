<text x="48" y="62" fill="#0F172A" font-size="28" font-weight="700" text-anchor="start">与原论文主表的对应关系</text>
<text x="48" y="90" fill="#475569" font-size="15" font-weight="400" text-anchor="start">原论文 Table 4 是检索主表。当前最可比的是本地 same-area-paper7 的 retrieval-only 复现，而不是 03/04 子集上的 VOP 细定位结果。</text>
<rect x="50" y="128" width="1320" height="140" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
<text x="78" y="172" fill="#475569" font-size="17" font-weight="400" text-anchor="start">原论文 Table 4 指标：R@1、R@5、AP、SDM@3、Dis@1；本质上是检索主表，不是细定位主表。</text>
<text x="78" y="200" fill="#475569" font-size="17" font-weight="400" text-anchor="start">本地 paper7 协议当前严格位置测试查询数为 383；实际有效测试场景主要是 01/02/03/04/08。</text>
<text x="78" y="228" fill="#475569" font-size="17" font-weight="400" text-anchor="start">因此当前 03/04 上的 VOP 结果可以说明方法有效，但不能直接写成“超过原论文主表”。</text>
<text x="70" y="308" fill="#0F172A" font-size="24" font-weight="700" text-anchor="start">可直接比较的检索指标</text>
