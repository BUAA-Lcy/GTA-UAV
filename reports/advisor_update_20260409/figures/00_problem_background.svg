<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="700" viewBox="0 0 1420 700" fill="none" role="img" aria-label="课题背景与切入点">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
</marker>
</defs>
<rect x="0" y="0" width="1420" height="700" fill="#F8FAFC"/>
<style>text{font-family:"Noto Sans CJK SC","Source Han Sans SC","Microsoft YaHei","PingFang SC","Hiragino Sans GB","DejaVu Sans","Arial",sans-serif;}</style>
<rect x="20" y="20" width="1380" height="660" rx="18.0" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="48" y="62" fill="#0F172A" font-size="28" font-weight="700" text-anchor="start">课题背景：为什么检索后细定位仍然困难</text>
<text x="48" y="90" fill="#475569" font-size="15" font-weight="400" text-anchor="start">这是一个两阶段任务：检索先缩小搜索范围，细定位再在候选卫星图上恢复更准确的位置。</text>
<rect x="50" y="130" width="400" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
<text x="74" y="168" fill="#0F172A" font-size="24" font-weight="700" text-anchor="start">任务位置</text>
<rect x="500" y="130" width="400" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
<text x="524" y="168" fill="#0F172A" font-size="24" font-weight="700" text-anchor="start">当前主要瓶颈</text>
<rect x="950" y="130" width="400" height="520" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
<text x="974" y="168" fill="#0F172A" font-size="24" font-weight="700" text-anchor="start">我们的切入思路</text>
<rect x="82" y="200" width="336" height="76" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
<text x="102" y="244" fill="#0F172A" font-size="18" font-weight="600" text-anchor="start">1 输入无人机查询图像</text>
<rect x="82" y="304" width="336" height="76" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
<text x="102" y="348" fill="#0F172A" font-size="18" font-weight="600" text-anchor="start">2 检索模型在卫星图库中排序</text>
<rect x="82" y="408" width="336" height="76" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
<text x="102" y="452" fill="#0F172A" font-size="18" font-weight="600" text-anchor="start">3 得到 top-K 候选，当前细定位主要接收 top-1</text>
<rect x="82" y="512" width="336" height="76" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.2"/>
<text x="102" y="556" fill="#0F172A" font-size="18" font-weight="600" text-anchor="start">4 细定位负责从候选图中恢复更准的位置</text>
<line x1="250" y1="276" x2="250" y2="304" stroke="#94A3B8" stroke-width="2.0" marker-end="url(#arrow)"/>
<line x1="250" y1="380" x2="250" y2="408" stroke="#94A3B8" stroke-width="2.0" marker-end="url(#arrow)"/>
<line x1="250" y1="484" x2="250" y2="512" stroke="#94A3B8" stroke-width="2.0" marker-end="url(#arrow)"/>
<rect x="532" y="200" width="336" height="92" rx="16" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.2"/>
<text x="550" y="234" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">方向歧义</text>
<text x="550" y="258" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">同一 query 在多个角度下都可能看起来部分合理</text>
<rect x="532" y="330" width="336" height="92" rx="16" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.2"/>
<text x="550" y="364" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">对应点不稳定</text>
<text x="550" y="388" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">错误匹配会直接污染后续几何估计</text>
<rect x="532" y="460" width="336" height="92" rx="16" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.2"/>
<text x="550" y="494" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">几何模型敏感</text>
<text x="550" y="518" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">角度一旦错了，RANSAC 与投影都容易连锁失败</text>
<rect x="982" y="200" width="336" height="92" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.2"/>
<text x="1000" y="234" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">不要只靠穷举试角度</text>
<text x="1000" y="258" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">方向问题需要被显式建模</text>
<rect x="982" y="330" width="336" height="92" rx="16" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.2"/>
<text x="1000" y="364" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">在匹配前先预测方向后验</text>
<text x="1000" y="388" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">让 VOP 给出少量高概率角度</text>
<rect x="982" y="460" width="336" height="92" rx="16" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.2"/>
<text x="1000" y="494" fill="#0F172A" font-size="18" font-weight="700" text-anchor="start">只让 top-k 角度进入匹配与几何验证</text>
<text x="1000" y="518" fill="#0F172A" font-size="16" font-weight="500" text-anchor="start">减少无效搜索并提高候选质量</text>
<text x="50" y="670" fill="#475569" font-size="16" font-weight="400" text-anchor="start">核心定位：VOP 插在检索与细定位之间，目标不是替代检索，而是把方向建模前置。</text>
</svg>